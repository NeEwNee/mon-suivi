<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Finance Tracker</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>💰 Finance Tracker</h1>

</header>

<div class="container">

<div class="card">

<h2>Solde total</h2>
<p id="balance">0 €</p>

</div>

<div class="grid">

<div class="card">

<h3>Revenus</h3>
<p id="income">0 €</p>

</div>

<div class="card">

<h3>Dépenses</h3>
<p id="expense">0 €</p>

</div>

</div>

<div class="card">

<h2>Objectif épargne</h2>

<input id="goalInput" placeholder="Objectif €">

<button onclick="setGoal()">Définir</button>

<p id="goalDisplay"></p>

</div>

<div class="card">

<h2>Ajouter transaction</h2>

<input id="desc" placeholder="Description">

<input id="amount" placeholder="Montant">

<select id="type">

<option value="income">Revenu</option>
<option value="expense">Dépense</option>

</select>

<button onclick="addTransaction()">Ajouter</button>

</div>

<div class="card">

<h2>Graphique dépenses</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>Transactions</h2>

<ul id="transactions"></ul>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
